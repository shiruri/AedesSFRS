<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Aedes SFRS</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --auth-card-width: 420px;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            position: relative;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--bg-secondary) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--bg-tertiary) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }
        .page-loader {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .page-loader-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .auth-container {
            width: 100%;
            max-width: var(--auth-card-width);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .auth-container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }
        .auth-logo-icon {
            width: 44px;
            height: 44px;
            background: var(--accent-primary);
            color: var(--text-inverse);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .auth-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }
        #alert-container {
            margin-bottom: 1.5rem;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .auth-form .input-group {
            position: relative;
        }
        .auth-form .input-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .auth-form .input-label a {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            transition: color var(--transition-fast);
        }
        .auth-form .input-label a:hover {
            color: var(--text-primary);
        }
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(calc(-50% - 12px));
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.25rem;
            background: none;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color var(--transition-fast);
        }
        .password-toggle:hover {
            color: var(--text-primary);
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper .input {
            padding-right: 3rem;
        }
        .input-error-text {
            display: none;
            color: var(--error);
            font-size: 0.75rem;
            margin-top: 0.375rem;
        }
        .input-group.has-error .input {
            border-color: var(--error);
        }
        .input-group.has-error .input-error-text {
            display: block;
        }
        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.875rem;
        }
        .remember-row label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .remember-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--accent-primary);
        }
        .auth-submit {
            margin-top: 0.5rem;
        }
        .auth-submit .btn {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }
        .auth-footer p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        .auth-footer a {
            color: var(--text-primary);
            font-weight: 500;
            transition: color var(--transition-fast);
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            transition: color var(--transition-fast);
        }
        .back-link:hover {
            color: var(--text-primary);
        }
        .theme-toggle-fixed {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 100;
        }
        @media (min-width: 768px) {
            .auth-card {
                border-radius: 20px;
                padding: 3rem;
            }
            body {
                padding: 3rem 2rem;
            }
        }
        @media (max-width: 480px) {
            .auth-container {
                padding: 0.5rem;
            }
            .auth-card {
                padding: 1.5rem;
                border-radius: 12px;
            }
            .auth-logo-icon {
                width: 38px;
                height: 38px;
            }
            .auth-title {
                font-size: 1.25rem;
            }
            .auth-submit .btn {
                padding: 0.875rem 1rem;
            }
        }
    </style>
</head>
<body class="theme-transition">
    <div class="page-loader" id="page-loader">
        <div class="page-loader-spinner"></div>
    </div>

    <button id="theme-toggle" class="btn btn-ghost btn-sm theme-toggle-fixed" aria-label="Toggle theme">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <div class="auth-container" id="auth-container">
        <div class="auth-card fade-in-up">
            <a href="index.html" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back to Home
            </a>

            <div class="auth-header">
                <div class="auth-logo">
                    <div class="auth-logo-icon">A</div>
                    <span>Aedes SFRS</span>
                </div>
                <h1 class="auth-title">Welcome back</h1>
                <p class="auth-subtitle">Sign in to access your dashboard</p>
            </div>

            <div id="alert-container"></div>

            <form id="login-form" class="auth-form" novalidate>
                <div class="input-group" id="login-group">
                    <label class="input-label" for="login">Email or Username</label>
                    <input type="text" id="login" name="login" class="input" placeholder="Enter your email or username" autocomplete="username">
                    <span class="input-error-text" id="login-error"></span>
                </div>

                <div class="input-group" id="password-group">
                    <label class="input-label" for="password">
                        Password
                        <a href="#">Forgot password?</a>
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="input" placeholder="Enter your password" autocomplete="current-password">
                        <button type="button" class="password-toggle" id="toggle-password" aria-label="Toggle password visibility">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <span class="input-error-text" id="password-error"></span>
                </div>

                <div class="remember-row">
                    <label for="remember">
                        <input type="checkbox" id="remember" name="remember">
                        Remember me
                    </label>
                </div>

                <div class="auth-submit">
                    <button type="submit" id="submit-btn" class="btn btn-primary">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Create account</a></p>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('page-loader');
            const container = document.getElementById('auth-container');
            
            setTimeout(() => {
                loader.classList.add('hidden');
                container.classList.add('visible');
            }, 300);

            if (Auth.isAuthenticated()) {
                Auth.redirectByRole();
            }

            const loginInput = document.getElementById('login');
            const passwordInput = document.getElementById('password');
            const form = document.getElementById('login-form');
            const submitBtn = document.getElementById('submit-btn');
            const togglePassword = document.getElementById('toggle-password');

            const clearErrors = () => {
                Validator.clearFieldError('login');
                Validator.clearFieldError('password');
                document.getElementById('alert-container').innerHTML = '';
            };

            [loginInput, passwordInput].forEach(input => {
                input.addEventListener('input', clearErrors);
            });

            togglePassword.addEventListener('click', () => {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                togglePassword.innerHTML = type === 'password'
                    ? '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
                    : '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                clearErrors();

                const login = loginInput.value.trim();
                const password = passwordInput.value;

                const { isValid, errors } = Validator.validateForm(
                    { login, password },
                    {
                        login: (v) => Validator.required(v, 'Email or username'),
                        password: (v) => Validator.required(v, 'Password')
                    }
                );

                if (!isValid) {
                    if (errors.login) {
                        Validator.showFieldError('login', errors.login);
                        document.getElementById('login-group').classList.add('has-error');
                    }
                    if (errors.password) {
                        Validator.showFieldError('password', errors.password);
                        document.getElementById('password-group').classList.add('has-error');
                    }
                    return;
                }

                App.showLoading(submitBtn);

                try {
                    const response = await API.auth.login({
                        login: login,
                        password: password
                    });

                    Auth.login(response);
                    App.showSuccess('Login successful! Redirecting...');
                    setTimeout(() => Auth.redirectByRole(), 800);

                } catch (error) {
                    const message = error.message || 'Invalid credentials. Please try again.';
                    App.showError(message);
                    loginInput.focus();
                } finally {
                    App.hideLoading(submitBtn);
                }
            });
        });
    </script>
</body>
</html>
