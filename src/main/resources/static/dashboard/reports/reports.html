<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports - AEDES</title>
<script src="../../js/toggles.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/sidebar.css">
<style>
:root{--bg:#ffffff;--bg2:#f8f9fa;--bg3:#f0f1f2;--txt:#111111;--txt2:#6b7280;--txt3:#9ca3af;--accent:#111111;--border:#e5e7eb}
.dark-mode,:root.dark-mode{--bg:#0a0a0a;--bg2:#141414;--bg3:#1f1f1f;--txt:#ffffff;--txt2:#a1a1aa;--txt3:#71717a;--accent:#ffffff;--border:#27272a}
html{scroll-behavior:smooth;height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .2s ease,color .2s ease}
.loader{z-index:9999;position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .25s ease,visibility .25s ease}
.loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loader-spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes f{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hdr-user{display:flex;align-items:center;gap:.6rem;padding:.3rem .4rem .3rem .75rem;border-radius:8px;cursor:pointer;text-decoration:none;color:inherit;transition:background .15s}
.hdr-user:hover{background:var(--bg2)}
.hdr-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8125rem;text-decoration:none;flex-shrink:0}
.hdr-name{font-size:.875rem;font-weight:500;color:var(--txt);text-decoration:none}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="loader-spin"></div></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<button class="menu-toggle-fixed" id="sidebar-toggle">
<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<aside class="sidebar" id="sidebar"></aside>
<div class="main-wrap">
<div class="header">
<div class="header-left"></div>
<div class="header-right">
<button class="header-btn" id="theme-toggle">
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>
<a href="../../profile/profile.html" class="hdr-user" id="hdr-user">
<div class="hdr-avatar" id="hdr-avatar">U</div>
<span class="hdr-name" id="hdr-name">User</span>
</a>
</div>
</div>
<div class="main-content">
<div class="page-hdr"><h1>Reports</h1><p>Analytics and usage reports</p></div>
<div class="card">
<div class="card-hdr"><h2>All Reports</h2></div>
<div class="empty-state">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
<p>No Reports yet</p>
</div>
</div>
</div>
</div>
<script src="../shared/sidebar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    AedesSidebar.buildSidebar('Reports');
    AedesSidebar.initSidebarToggle();
    AedesSidebar.populateHeaderUser();
    setTimeout(function(){
        document.getElementById('loader').classList.add('hidden');
        document.querySelectorAll('.page-hdr,.card').forEach(function(e,i){e.style.animation='f .5s ease forwards';e.style.animationDelay=(i*0.1)+'s';e.style.opacity='0'});
    },100);
});
</script>
</body>
</html>
